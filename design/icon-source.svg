<?xml version="1.0" encoding="UTF-8"?>
<!--
  Skillful Claude application icon (placeholder).
  Brand orange squircle that matches the dashboard's claude/skill
  palette, with a centered four-point sparkle glyph mirroring the
  SkillNode icon. Replace this file with real artwork when shipping;
  `npm run icons` regenerates every platform-specific output from
  whatever vector source lives at this path.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="14"/>
    </filter>
  </defs>

  <!-- Squircle background -->
  <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224" fill="url(#bg)"/>

  <!-- Soft inner highlight -->
  <rect x="64" y="64" width="896" height="896" rx="192" ry="192"
        fill="none" stroke="#FFFFFF" stroke-opacity="0.18" stroke-width="3"/>

  <!-- Glow halo behind the sparkle -->
  <g filter="url(#glow)" opacity="0.55">
    <path d="M512 232
             L568 456
             L792 512
             L568 568
             L512 792
             L456 568
             L232 512
             L456 456 Z"
          fill="#FFFFFF"/>
  </g>

  <!-- Main four-point sparkle glyph -->
  <path d="M512 256
           L560 464
           L768 512
           L560 560
           L512 768
           L464 560
           L256 512
           L464 464 Z"
        fill="#FFFFFF"/>

  <!-- Small accent sparkles -->
  <circle cx="320" cy="320" r="14" fill="#FFFFFF" fill-opacity="0.85"/>
  <circle cx="720" cy="312" r="10" fill="#FFFFFF" fill-opacity="0.7"/>
  <circle cx="704" cy="720" r="16" fill="#FFFFFF" fill-opacity="0.85"/>
</svg>
