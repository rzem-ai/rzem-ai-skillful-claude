<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Effective Config · Config Studio</title>
<link rel="stylesheet" href="css/app.css" />
<style>
  /* Dashboard-local */
  .filters { display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:12px; }
  .scope-filter { display:inline-flex; gap:4px; align-items:center; }
  .sf { cursor:pointer; user-select:none; }
  .sf.off { opacity:.32; filter:grayscale(.5); }
  .count-pill { font:11px/1 var(--mono); color:var(--fg-dim); margin-left:auto; }
  td .secret { display:inline-flex; align-items:center; gap:8px; }
  td .reveal { color:var(--fg-dim); cursor:pointer; display:flex; }
  td .reveal:hover { color:var(--accent); }
  .lint-i { color:var(--warn); display:inline-flex; vertical-align:-2px; margin-left:6px; }
  .ignored-i { color:var(--warn); }
  .insp-actions { display:flex; gap:8px; padding:12px 14px; border-top:1px solid var(--border); }
  .src-file { font:11px var(--mono); color:var(--fg-muted); word-break:break-all; }
  .differ { display:inline-flex; align-items:center; gap:4px; font-size:11px; color:var(--info); }
</style>
</head>
<body data-view="dashboard">
<div class="app" id="app">
  <header class="toolbar" id="tb"></header>
  <nav class="sidebar" id="sb"></nav>
  <main class="main" id="main">
    <section class="view">
      <div class="view-head">
        <div class="col">
          <h1>Effective Configuration</h1>
          <span class="sub">Every key in effect for <b class="muted">config-studio</b> — resolved value, type, and where it came from.</span>
        </div>
        <div class="spacer"></div>
        <button class="btn ghost sm" id="expandAll">Resolved keys: <b id="rowCount" style="margin-left:4px">12</b></button>
      </div>
      <div class="view-body">
        <div class="filters">
          <input class="field" id="tableSearch" type="text" placeholder="Filter keys…" style="width:240px" />
          <div class="scope-filter" id="scopeFilter"></div>
          <select class="field" id="catFilter">
            <option value="">All categories</option>
            <option value="model">Model &amp; effort</option>
            <option value="permissions">Permissions</option>
            <option value="environment">Environment</option>
            <option value="quality">Quality of life</option>
            <option value="security">Security / managed</option>
            <option value="ide">IDE</option>
          </select>
          <label class="chk" id="cDiffer"><input type="checkbox" />Differs from default</label>
          <label class="chk" id="cConflict"><input type="checkbox" />Has conflicts</label>
          <span class="count-pill" id="filterCount"></span>
        </div>

        <div class="card" style="overflow:hidden">
          <table class="tbl" id="cfgTable">
            <thead><tr>
              <th style="width:30%">Key</th>
              <th style="width:26%">Resolved value</th>
              <th style="width:84px">Type</th>
              <th style="width:130px">Provenance</th>
              <th>Status</th>
            </tr></thead>
            <tbody id="cfgBody"></tbody>
          </table>
        </div>
      </div>
    </section>

    <aside class="inspector" id="insp">
      <div id="inspContent"></div>
    </aside>
  </main>
</div>

<script src="js/shell.js"></script>
<script>
(function(){
  var svg = Shell.svg, chip = Shell.chip;

  // ---- Fixture: effective config (Part B1 + env) ----
  var DATA = [
    { key:'model', value:'claude-sonnet-4-6', type:'string', cat:'model',
      scope:'project', differ:true, conflict:true,
      chain:[
        {scope:'project', value:'claude-sonnet-4-6', status:'winner', path:'.claude/settings.json', mod:'Jun 5'},
        {scope:'user', value:'claude-opus-4-7', status:'shadowed', path:'~/.claude/settings.json', mod:'Jun 2', note:'Shadowed by Project'}
      ] },
    { key:'permissions.defaultMode', value:'acceptEdits', type:'enum', cat:'permissions',
      scope:'project', differ:true, conflict:true, hero:true,
      chain:[
        {scope:'project', value:'acceptEdits', status:'winner', path:'.claude/settings.json', mod:'Jun 5'},
        {scope:'user', value:'plan', status:'shadowed', path:'~/.claude/settings.json', mod:'Jun 2', note:'Shadowed by Project'},
        {scope:'local', value:'auto', status:'ignored', path:'.claude/settings.local.json', mod:'Jun 6',
          note:'Ignored — “auto” mode can only be set in user settings (since v2.1.142). This entry has no effect.', action:'Move to user settings'}
      ] },
    { key:'outputStyle', value:'Explanatory', type:'string', cat:'quality',
      scope:'local', differ:true, conflict:false,
      chain:[ {scope:'local', value:'Explanatory', status:'winner', path:'.claude/settings.local.json', mod:'Jun 6'} ] },
    { key:'effortLevel', value:'high', type:'enum', cat:'model',
      scope:'user', differ:true, conflict:false,
      chain:[ {scope:'user', value:'high', status:'winner', path:'~/.claude/settings.json', mod:'Jun 2'} ] },
    { key:'alwaysThinkingEnabled', value:'true', type:'boolean', cat:'model',
      scope:'user', differ:true, conflict:false,
      chain:[ {scope:'user', value:'true', status:'winner', path:'~/.claude/settings.json', mod:'Jun 2'} ] },
    { key:'editorMode', value:'vim', type:'enum', cat:'quality',
      scope:'user', differ:true, conflict:false,
      chain:[ {scope:'user', value:'vim', status:'winner', path:'~/.claude/settings.json', mod:'Jun 2'} ] },
    { key:'env.NODE_ENV', value:'development', type:'string', cat:'environment',
      scope:'user', differ:true, conflict:false,
      chain:[ {scope:'user', value:'development', status:'winner', path:'~/.claude/settings.json', mod:'Jun 2'} ] },
    { key:'env.NPM_TOKEN', value:'npm_4xK9fT2mQ8vLpR3sW7yB1nC5dH6jZ0aE', type:'string', cat:'environment',
      scope:'user', differ:true, conflict:false, secret:true,
      chain:[ {scope:'user', value:'npm_••••••••••••', status:'winner', path:'~/.claude/settings.json', mod:'Jun 2'} ] },
    { key:'forceLoginMethod', value:'claudeai', type:'enum', cat:'security',
      scope:'managed', differ:true, conflict:false, locked:true, channel:'Enforced via file — /etc/claude-code/managed-settings.json',
      chain:[ {scope:'managed', value:'claudeai', status:'winner', path:'/etc/claude-code/managed-settings.json', mod:'May 12'} ] },
    { key:'disableBypassPermissionsMode', value:'disable', type:'enum', cat:'security',
      scope:'managed', differ:true, conflict:false, locked:true, channel:'Enforced via file — /etc/claude-code/managed-settings.json',
      chain:[ {scope:'managed', value:'disable', status:'winner', path:'/etc/claude-code/managed-settings.json', mod:'May 12'} ] },
    { key:'autoConnectIde', value:'—', type:'inert', cat:'ide',
      scope:null, differ:false, conflict:true, inert:true,
      lint:'This key is ignored here — it belongs in ~/.claude.json. It currently has no effect.', lintAction:'Move it',
      chain:[ {scope:'user', value:'true', status:'ignored', path:'~/.claude/settings.json', mod:'Jun 2',
        note:'Wrong file — autoConnectIde is a global-config key. It must live in ~/.claude.json or it is silently ignored.', action:'Move to ~/.claude.json'} ] },
    { key:'spinnerTipsEnabled', value:'true', type:'boolean', cat:'quality',
      scope:null, differ:false, conflict:false, isDefault:true,
      lint:'A managed drop-in tried to set this to false, but that file is invalid JSON and was excluded. Falling back to default.',
      chain:[ {scope:'managed', value:'false', status:'ignored', path:'managed-settings.d/20-experimental.json', mod:'—',
        note:'Source file is invalid JSON (trailing comma, line 4) — excluded from resolution. Effective value falls back to default true.', action:'Open in Raw Editor'} ] }
  ];

  // ---- Build scope filter chips ----
  var activeScopes = {managed:1,cli:1,local:1,project:1,user:1};
  var sfWrap = document.getElementById('scopeFilter');
  ['managed','local','project','user'].forEach(function(s){
    var el = document.createElement('span');
    el.className='sf'; el.dataset.scope=s; el.innerHTML = chip(s);
    el.addEventListener('click', function(){
      activeScopes[s] = activeScopes[s]?0:1;
      el.classList.toggle('off', !activeScopes[s]); render();
    });
    sfWrap.appendChild(el);
  });

  function vclass(t){ return t==='boolean'?'bool':(t==='string'?'str':''); }
  function valCell(d){
    if (d.inert) return '<span class="dim mono-v">—</span>';
    if (d.secret) {
      return '<span class="secret"><span class="v str" data-masked="1">npm_••••••••••••</span>'+
             '<span class="reveal" title="Reveal value">'+svg('eyeoff',13)+'</span></span>';
    }
    return '<span class="v '+vclass(d.type)+'">'+d.value+'</span>';
  }
  function statusCell(d){
    if (d.locked) return '<span class="tag lock">'+svg('lock',11)+'Managed lock</span>';
    if (d.inert)  return '<span class="shadow-i ignored-i">'+svg('alert',12)+'Ignored · wrong file</span>';
    if (d.isDefault) return '<span class="shadow-i">'+svg('info',12)+'Default · source excluded</span>';
    var hasIgnored = d.chain.some(function(c){return c.status==='ignored';});
    var hasShadow  = d.chain.some(function(c){return c.status==='shadowed';});
    if (hasIgnored) return '<span class="shadow-i ignored-i">'+svg('alert',12)+'1 shadowed · 1 ignored</span>';
    if (hasShadow)  return '<span class="shadow-i">'+svg('layers',12)+'Shadows '+(d.chain.length-1)+'</span>';
    return '<span class="dim" style="font-size:11px">—</span>';
  }

  var tbody = document.getElementById('cfgBody');
  var selectedKey = null;

  function render(){
    var q = document.getElementById('tableSearch').value.trim().toLowerCase();
    var cat = document.getElementById('catFilter').value;
    var onlyDiffer = document.getElementById('cDiffer').querySelector('input').checked;
    var onlyConflict = document.getElementById('cConflict').querySelector('input').checked;
    var rows = DATA.filter(function(d){
      if (q && d.key.toLowerCase().indexOf(q)<0 && String(d.value).toLowerCase().indexOf(q)<0) return false;
      if (cat && d.cat!==cat) return false;
      if (onlyDiffer && !d.differ) return false;
      if (onlyConflict && !d.conflict) return false;
      if (d.scope && !activeScopes[d.scope]) return false;
      return true;
    });
    tbody.innerHTML = rows.map(function(d){
      var prov = d.scope ? chip(d.scope, {path:d.chain[0].path, meta:'Last modified '+d.chain[0].mod}) : '<span class="dim" style="font-size:11px">none active</span>';
      var lint = d.lint ? '<span class="lint-i" title="'+d.lint.replace(/"/g,'&quot;')+'">'+svg('alert',13)+'</span>' : '';
      return '<tr data-key="'+d.key+'"'+(d.key===selectedKey?' class="sel"':'')+'>'+
        '<td><span class="k">'+d.key+'</span>'+lint+'</td>'+
        '<td>'+valCell(d)+'</td>'+
        '<td><span class="ty">'+d.type+'</span></td>'+
        '<td>'+prov+'</td>'+
        '<td>'+statusCell(d)+'</td>'+
      '</tr>';
    }).join('');
    document.getElementById('filterCount').textContent = rows.length+' of '+DATA.length+' keys';
    document.getElementById('rowCount').textContent = DATA.length;
    // wire
    Array.prototype.forEach.call(tbody.querySelectorAll('tr'), function(tr){
      tr.addEventListener('click', function(e){
        if (e.target.closest('.reveal')) return;
        selectKey(tr.dataset.key);
      });
    });
    Array.prototype.forEach.call(tbody.querySelectorAll('.reveal'), function(r){
      r.addEventListener('click', function(e){
        e.stopPropagation();
        var span = r.previousElementSibling;
        if (span.dataset.masked) { span.textContent='npm_4xK9fT2mQ8vLpR3sW7yB1nC5dH6jZ0aE'; span.removeAttribute('data-masked'); r.innerHTML=svg('eye',13); }
        else { span.textContent='npm_••••••••••••'; span.dataset.masked='1'; r.innerHTML=svg('eyeoff',13); }
      });
    });
  }

  // ---- Inspector: resolution chain ----
  function chainRow(c){
    var cls = 'chain-row '+(c.status==='winner'?'winner':(c.status==='ignored'?'ignored':'shadowed'));
    var pill = c.status==='winner' ? '<span class="win-pill">winner</span>'
            : c.status==='ignored' ? '<span class="ignored-pill">ignored by rule</span>' : '';
    var note = c.note ? '<div class="cm-note'+(c.status==='ignored'?' warn':'')+'">'+
                 (c.status==='ignored'?svg('alert',13):'')+'<span>'+c.note+'</span></div>' : '';
    var act = c.action ? '<div style="margin-top:7px"><button class="btn sm" data-act="'+c.action+'">'+c.action+' '+svg('arrow',12)+'</button></div>' : '';
    return '<div class="'+cls+'">'+
      '<div class="chain-rail"><div class="node"></div><div class="line"></div></div>'+
      '<div class="chain-main"><div class="cm-top">'+chip(c.scope)+' <span class="cm-val">'+c.value+'</span> '+pill+'</div>'+
        '<div class="cm-note dim" style="margin-top:5px">'+c.path+' · '+c.mod+'</div>'+ note + act +
      '</div></div>';
  }

  function selectKey(key){
    selectedKey = key;
    var d = DATA.find(function(x){return x.key===key;});
    Array.prototype.forEach.call(tbody.querySelectorAll('tr'), function(tr){ tr.classList.toggle('sel', tr.dataset.key===key); });
    Shell.setInspector(true);
    var c = document.getElementById('inspContent');
    var lock = d.locked ? '<div class="insp-sec"><div class="locked"><span class="lk-ico">'+svg('lock',16)+'</span><div><div class="lk-val">'+d.value+'</div><div class="lk-chan">'+d.channel+'</div></div></div></div>' : '';
    var lint = d.lint ? '<div class="insp-sec"><div class="effect warn">'+svg('alert',14)+'<span>'+d.lint+'</span></div></div>' : '';
    var actions = d.locked ? '' :
      '<div class="insp-actions">'+
        '<a class="btn primary sm" href="raw-editor.html?key=defaultMode"'+(d.hero?'':' style="display:none"')+'>'+svg('compare',13)+'Open side-by-side</a>'+
        '<a class="btn sm" href="guided-permissions.html">'+svg('sliders',13)+'Edit in Guided</a>'+
        '<a class="btn sm" href="raw-editor.html">'+svg('code',13)+'Open in Raw</a>'+
      '</div>';
    c.innerHTML =
      '<div class="insp-h"><div><div class="eyebrow">Resolution chain</div><h2>'+d.key+'</h2></div>'+
        '<div class="spacer"></div><button class="icon-btn" id="inspClose" title="Close">'+svg('xcircle',16)+'</button></div>'+
      '<div class="insp-b">'+
        '<div class="insp-sec"><h4>Effective value</h4>'+
          '<div class="row gap-sm" style="align-items:baseline"><span class="mono-v" style="font-size:14px;font-weight:600">'+(d.inert?'—':d.value)+'</span><span class="ty">'+d.type+'</span>'+(d.scope?chip(d.scope):'')+'</div></div>'+
        lock + lint +
        '<div class="insp-sec"><h4>Precedence ('+d.chain.length+' source'+(d.chain.length>1?'s':'')+')</h4><div class="chain">'+
          d.chain.map(chainRow).join('')+'</div></div>'+
        '<div class="insp-sec"><h4>Why this value</h4><p class="hint" style="line-height:1.5">'+
          (d.locked ? 'Managed scope sits above every other source and cannot be overridden — not even by CLI flags.'
           : d.inert ? 'No active source supplies this key in a valid location, so it has no effect on the session.'
           : d.isDefault ? 'No valid source defines this key, so Claude Code uses its built-in default.'
           : d.chain.length>1 ? 'Scope order is Managed › CLI › Local › Project › User. The highest scope that defines this key in a valid location wins; lower scopes are shadowed.'
           : 'Only one source defines this key, so it wins uncontested.')+'</p></div>'+
      '</div>'+ actions;
    var cl = document.getElementById('inspClose'); if (cl) cl.addEventListener('click', function(){ Shell.setInspector(false); selectedKey=null; render(); });
    Array.prototype.forEach.call(c.querySelectorAll('[data-act]'), function(b){
      b.addEventListener('click', function(){
        var a = b.dataset.act;
        if (a.indexOf('Raw')>=0) window.location.href='raw-editor.html';
        else if (a.indexOf('user settings')>=0 || a.indexOf('.claude.json')>=0) window.location.href='guided-permissions.html';
        else Shell.toast('“'+a+'” — opens the guided fix','sliders');
      });
    });
  }

  // ---- wire filters ----
  document.getElementById('tableSearch').addEventListener('input', render);
  document.getElementById('catFilter').addEventListener('change', render);
  document.getElementById('cDiffer').addEventListener('change', function(){ this.classList.toggle('on', this.querySelector('input').checked); render(); });
  document.getElementById('cConflict').addEventListener('change', function(){ this.classList.toggle('on', this.querySelector('input').checked); render(); });
  document.getElementById('expandAll').addEventListener('click', function(){ selectKey('permissions.defaultMode'); });

  render();

  // ---- deep link: ?q= preloads search; hero auto-opens defaultMode ----
  var params = new URLSearchParams(location.search);
  var q = params.get('q');
  if (q){ document.getElementById('tableSearch').value = q; render();
    var hit = DATA.find(function(d){return d.key.toLowerCase().indexOf(q.toLowerCase())>=0;});
    if (hit) selectKey(hit.key);
  }
})();
</script>
</body>
</html>
