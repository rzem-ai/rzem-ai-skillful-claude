<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Scope Stack · Config Studio</title>
<link rel="stylesheet" href="css/app.css" />
<style>
  .stack { max-width: 940px; }
  .prec-note { display:flex; align-items:center; gap:10px; margin-bottom:16px; color:var(--fg-dim); font-size:12px; }
  .prec-note .arrow { color:var(--fg-faint); }
  .layer { display:grid; grid-template-columns: 26px 1fr; gap:14px; }
  .layer + .layer { margin-top: 2px; }
  .rail { display:flex; flex-direction:column; align-items:center; }
  .rail .num { width:22px; height:22px; border-radius:50%; display:grid; place-items:center; font:11px var(--mono); font-weight:700; color:var(--fg-dim); background:var(--surface-3); border:1px solid var(--border); }
  .rail .conn { flex:1; width:2px; background:var(--border); margin:3px 0; }
  .layer:last-child .rail .conn { display:none; }
  .lcard { margin-bottom:2px; }
  .lcard .card-h { justify-content:space-between; }
  .lcard .lh-left { display:flex; align-items:center; gap:10px; }
  .lcard .winner-flag { font-size:10px; color:var(--scope-managed); font-weight:700; text-transform:uppercase; letter-spacing:.05em; }
  .lmeta { display:flex; gap:18px; flex-wrap:wrap; padding:11px 14px; border-bottom:1px solid var(--border-soft); }
  .lmeta .m { display:flex; flex-direction:column; gap:2px; }
  .lmeta .m .ml { font-size:10.5px; text-transform:uppercase; letter-spacing:.05em; color:var(--fg-dim); }
  .lmeta .m .mv { font:12px var(--mono); color:var(--fg); }
  .files { padding: 6px 0; }
  .frow { display:grid; grid-template-columns: 1fr auto auto; align-items:center; gap:12px; padding:8px 14px; }
  .frow + .frow { border-top:1px solid var(--border-soft); }
  .frow .fpath { font:12px var(--mono); color:var(--fg); display:flex; align-items:center; gap:8px; }
  .frow .fpath .fico { color:var(--fg-dim); display:flex; }
  .frow .fnote { font-size:11px; color:var(--fg-dim); margin-top:2px; }
  .openraw { color:var(--accent); font-size:11px; cursor:pointer; display:inline-flex; align-items:center; gap:4px; white-space:nowrap; text-decoration:none; }
  .openraw:hover { text-decoration:underline; }
  .channel { display:inline-flex; align-items:center; gap:6px; font-size:11px; color:var(--scope-managed); background:color-mix(in oklab,var(--scope-managed) 11%,transparent); padding:3px 9px; border-radius:5px; }
</style>
</head>
<body data-view="scope">
<div class="app" id="app">
  <header class="toolbar" id="tb"></header>
  <nav class="sidebar" id="sb"></nav>
  <main class="main" id="main">
    <section class="view">
      <div class="view-head">
        <div class="col">
          <h1>Scope Stack</h1>
          <span class="sub">The five configuration layers in real precedence order. Higher layers win.</span>
        </div>
      </div>
      <div class="view-body">
        <div class="stack" id="stack">
          <div class="prec-note">
            <span>Precedence</span><span class="arrow">→</span>
            <span class="mono-v">Managed</span><span class="arrow">›</span>
            <span class="mono-v">CLI args</span><span class="arrow">›</span>
            <span class="mono-v">Local</span><span class="arrow">›</span>
            <span class="mono-v">Project</span><span class="arrow">›</span>
            <span class="mono-v">User</span>
            <span style="margin-left:auto" class="hint">Scalars override · arrays merge + dedupe</span>
          </div>
          <div id="layers"></div>
        </div>
      </div>
    </section>
  </main>
</div>

<script src="js/shell.js"></script>
<script>
(function(){
  var svg = Shell.svg, chip = Shell.chip;
  var LAYERS = [
    { scope:'managed', win:true, keys:4, mod:'May 12', delivery:'Enforced via file',
      health:{cls:'warn', label:'1 of 2 files invalid'},
      files:[
        { path:'/etc/claude-code/managed-settings.json', health:'ok', note:'Base policy — deny rules, login method, sandbox network' },
        { path:'/etc/claude-code/managed-settings.d/20-experimental.json', health:'err', note:'Invalid JSON — trailing comma at line 4. Excluded from resolution.' }
      ]},
    { scope:'cli', win:false, keys:0, mod:'—', empty:true,
      health:{cls:'miss', label:'No flags this session'},
      files:[ { path:'--model · --permission-mode · --settings', health:'miss', note:'Session-only overrides. None passed when this project was opened.' } ]},
    { scope:'local', win:false, keys:3, mod:'Jun 6', gitignore:true,
      health:{cls:'ok', label:'Valid · 1 ignored key', info:true},
      files:[ { path:'.claude/settings.local.json', health:'ok', gitignore:true, note:'defaultMode: "auto" is ignored by rule (auto is user-scope only).' } ]},
    { scope:'project', win:false, keys:5, mod:'Jun 5', committed:true,
      health:{cls:'warn', label:'Valid · 1 unreachable rule'},
      files:[ { path:'.claude/settings.json', health:'warn', committed:true, note:'allow Bash(curl localhost*) can never beat the managed curl deny.' } ]},
    { scope:'user', win:false, keys:8, mod:'Jun 2',
      health:{cls:'warn', label:'Valid · 1 wrong-file key, 1 secret'},
      files:[ { path:'~/.claude/settings.json', health:'warn', note:'autoConnectIde belongs in ~/.claude.json · NPM_TOKEN masked.' } ]}
  ];

  function fhealth(h){
    var map={ok:'ok',warn:'warn',err:'err',miss:'miss'};
    var lbl={ok:'Valid',warn:'Warnings',err:'Invalid JSON',miss:'Not present'};
    return '<span class="health '+map[h]+'"><span class="dot"></span>'+lbl[h]+'</span>';
  }

  document.getElementById('layers').innerHTML = LAYERS.map(function(l, i){
    var sc = Shell.SCOPES[l.scope];
    var badges = '';
    if (l.gitignore) badges += '<span class="tag gitignore">gitignored</span>';
    if (l.committed) badges += '<span class="tag info">'+svg('repo',11)+'committed</span>';
    var hb = '<span class="health '+l.health.cls+'"><span class="dot"></span>'+l.health.label+'</span>';
    var meta =
      '<div class="lmeta">'+
        '<div class="m"><span class="ml">Keys defined</span><span class="mv">'+(l.empty?'—':l.keys)+'</span></div>'+
        '<div class="m"><span class="ml">Last modified</span><span class="mv">'+l.mod+'</span></div>'+
        (l.delivery?'<div class="m"><span class="ml">Delivery channel</span><span class="mv"><span class="channel">'+svg('lock',11)+l.delivery+'</span></span></div>':'')+
        '<div class="m" style="margin-left:auto;align-items:flex-end"><span class="ml">Status</span><span class="mv">'+hb+'</span></div>'+
      '</div>';
    var files = '<div class="files">'+ l.files.map(function(f){
      var fb='';
      if (f.gitignore) fb+='<span class="tag gitignore">gitignored</span>';
      if (f.committed) fb+='<span class="tag info">committed</span>';
      if (l.scope==='managed') fb+='<span class="tag lock">'+svg('lock',10)+'read-only</span>';
      var raw = (l.scope==='managed'||l.empty)
        ? (l.empty?'':'<span class="openraw" style="opacity:.5;cursor:default" title="Managed files are read-only">'+svg('eye',12)+'view</span>')
        : '<a class="openraw" href="raw-editor.html">'+svg('code',12)+'open raw</a>';
      return '<div class="frow"><div><div class="fpath"><span class="fico">'+svg(l.empty?'terminal':'file',13)+'</span>'+f.path+' '+fb+'</div>'+
             (f.note?'<div class="fnote">'+f.note+'</div>':'')+'</div>'+ fhealth(f.health) + raw +'</div>';
    }).join('') +'</div>';

    return '<div class="layer"><div class="rail"><div class="num">'+(i+1)+'</div><div class="conn"></div></div>'+
      '<div class="card lcard"><div class="card-h"><div class="lh-left">'+chip(l.scope, {solid:true})+
        (l.win?'<span class="winner-flag">cannot be overridden</span>':'')+'</div>'+ hb +'</div>'+
        meta + files +'</div></div>';
  }).join('');
})();
</script>
</body>
</html>
