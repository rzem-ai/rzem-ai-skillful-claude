appId: ai.rzem.skillful-claude
productName: Skillful Claude
copyright: Copyright © 2026 Rzem AI

# Pull files from electron-vite's build output (out/) plus the renderer
# bundle. `node_modules` is included implicitly because we leave certain
# packages outside the asar via `asarUnpack`.
files:
  - out/**/*
  - package.json
  - "!**/*.map"

# `asar: true` packs everything into app.asar. Add `asarUnpack` entries
# here for any package that must live as real files on disk (e.g. a CLI
# spawned via child_process, or a dep with native binaries).
asar: true

directories:
  buildResources: build
  output: dist-builds

# ── Auto-update via GitHub Releases ────────────────────────────────────
# electron-updater reads this same config from app-update.yml at runtime.
# CI publishes draft releases via `npm run release` (which sets
# --publish=always). Bumping `version` in package.json + creating a tag
# triggers the upload.
publish:
  provider: github
  owner: rzem-ai
  repo: rzem-ai-skillful-claude
  releaseType: release

# ── Per-platform targets ───────────────────────────────────────────────

# build/icon.png (1024×1024, rendered from build/icon.svg) is converted to
# .icns/.ico automatically by electron-builder.

linux:
  icon: build/icon.png
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
    - target: rpm
      arch:
        - x64
  category: Development

mac:
  icon: build/icon.png
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  category: public.app-category.developer-tools
  hardenedRuntime: true
  gatekeeperAssess: false
  # CI runs with CSC_IDENTITY_AUTO_DISCOVERY=false (no signing certs), so
  # notarization cannot run. Flip to true once a Developer ID cert is wired
  # into the release workflow.
  notarize: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist

win:
  icon: build/icon.png
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
