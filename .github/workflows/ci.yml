name: CI

# Fast validation on every push to main and on PRs. This does NOT package
# installers (that's release.yml's job) — it just proves the code compiles,
# typechecks, and passes the Vitest engine suite.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel an in-flight run when new commits land on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Create .npmrc
        run: |
          cat > .npmrc <<EOF
          @fortawesome:registry=https://npm.fontawesome.com/
          @awesome.me:registry=https://npm.fontawesome.com/
          //npm.fontawesome.com/:_authToken=${{ secrets.NPM_TOKEN }}
          EOF

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (renderer + main/preload)
        run: npm run typecheck

      - name: Test (engine + live-host smoke)
        run: npm test

      - name: Build (electron-vite bundles)
        run: npm run build
